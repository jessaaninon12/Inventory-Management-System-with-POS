<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System Dashboard</title> 
    <link rel="stylesheet" href="jovy.css">

</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-shopping-bag"></i> <span>Inventory Management System</span>
            </div>
            <ul>
                <li class="active"><i class="fas fa-th-large"></i> Dashboard</li>
                <li><i class="fas fa-tags"></i> Brands</li>
                <li><i class="fas fa-box"></i> Products</li>
                <li><i class="fas fa-list"></i> Categories</li>
                <li><i class="fas fa-shopping-cart"></i> Orders</li>
                <li><i class="fas fa-users"></i> Customers</li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <div class="user-profile">
                    <span>Jessa Aniñon</span>
                    <img src="640417112_887594254262752_3223747691727440566_n.jpg" alt="profile">
                </div>
            </header>

            <section class="stats-grid">
                <div class="card revenue">
                    <div class="icon"><i class="fas fa-dollar-sign"></i></div>
                    <div>
                        <p>Revenue</p>
                        <h3>$18,925</h3>
                    </div>
                </div>
                <div class="card expense">
                    <div class="icon"><i class="fas fa-credit-card"></i></div>
                    <div>
                        <p>Expense</p>
                        <h3>$11,024</h3>
                    </div>
                </div>
                <div class="card clients">
                    <div class="icon"><i class="fas fa-smile"></i></div>
                    <div>
                        <p>Happy Clients</p>
                        <h3>8,925</h3>
                    </div>
                </div>
                <div class="card new-store">
                    <div class="icon"><i class="fas fa-store"></i></div>
                    <div>
                        <p>New Store Open</p>
                        <h3>8,925</h3>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
