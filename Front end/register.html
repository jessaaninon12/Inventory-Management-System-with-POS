<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haneus Café — Sign Up</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-left:    #f8f1e9;      /* warm cream/beige */
      --text-dark:  #3c2f2f;      /* deep coffee brown */
      --accent:     #c47b42;      /* caramel */
      --accent-dark:#a35f2e;
      --input-bg:   #fffaf5;
      --shadow:     0 8px 24px rgba(60,47,47,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--bg-left);
      color: var(--text-dark);
      overflow: hidden;
    }

    .split-screen {
      display: flex;
      height: 100vh;
    }

    .auth-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg-left);
    }

    .form-container {
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2.5rem;
      text-align: center;
      color: var(--text-dark);
    }

    .input-group {
      position: relative;
      margin-bottom: 1.4rem;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1rem 1rem 3.2rem;
      border: none;
      border-radius: 12px;
      background: var(--input-bg);
      font-size: 1rem;
      color: var(--text-dark);
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(196,123,66,0.18), var(--shadow);
    }

    .input-group svg {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--accent);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dark);
      opacity: 0.6;
    }

    .btn-signup {
      width: 60%;
      margin: 1.8rem auto 1.6rem;
      display: block;
      padding: 0.95rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
    }

    .btn-signup:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 1.4rem 0 1rem;
      color: #aaa;
      font-size: 0.9rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      padding: 0 1.2rem;
    }

    .login-link {
      text-align: center;
      font-size: 0.95rem;
      color: #666;
      margin-top: 0.8rem;
    }

    .login-link a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    /* Right: Visual (same as login) */
    .visual-side {
      flex: 1;
      background: linear-gradient(90deg, #3c2f2f 0%, #1f1717 100%);
      position: relative;
      overflow: hidden;
    }

    .visual-side::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(196,123,66,0.08) 0%, transparent 60%);
      opacity: 0.7;
    }

    @media (max-width: 1023px) {
      .split-screen {
        flex-direction: column;
      }
      .visual-side {
        display: none;
      }
      .auth-side {
        padding: 1.5rem;
      }
      .form-container {
        max-width: 420px;
      }
    }
  </style>
</head>
<body>

<div class="split-screen">

  <!-- Left: Sign Up Form -->
  <div class="auth-side">
    <div class="form-container">
      <h1>CREATE ACCOUNT</h1>

      <form id="signupForm">
        <div class="input-group">
          <i data-lucide="user"></i>
          <input type="text" name="name" placeholder="Name" required autocomplete="name">
        </div>

        <div class="input-group">
          <i data-lucide="mail"></i>
          <input type="email" name="email" placeholder="Email Address" required autocomplete="email">
        </div>

        <div class="input-group password-wrapper">
          <i data-lucide="lock"></i>
          <input type="password" id="password" name="password" placeholder="Password" required autocomplete="new-password">
          <button type="button" class="toggle-password" id="togglePassword">
            <i data-lucide="eye" id="eyeIcon"></i>
          </button>
        </div>

        <div class="input-group password-wrapper">
          <i data-lucide="lock"></i>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required autocomplete="new-password">
          <button type="button" class="toggle-password" id="toggleConfirmPassword">
            <i data-lucide="eye" id="eyeIconConfirm"></i>
          </button>
        </div>

        <button type="submit" class="btn-signup">Sign Up</button>
      </form>

      <div class="divider"><span>OR</span></div>

      <div class="login-link">
        Already have an account? <a href="login.html">Login here.</a>
      </div>
    </div>
  </div>

  <!-- Right: Aesthetic Panel (same as login) -->
  <div class="visual-side"></div>

</div>

<script>
  lucide.createIcons();

  // Password visibility toggle - main password
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');

  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
    lucide.createIcons();
  });

  // Password visibility toggle - confirm password
  const toggleConfirm = document.getElementById('toggleConfirmPassword');
  const confirmInput = document.getElementById('confirmPassword');
  const eyeIconConfirm = document.getElementById('eyeIconConfirm');

  toggleConfirm.addEventListener('click', () => {
    const type = confirmInput.type === 'password' ? 'text' : 'password';
    confirmInput.type = type;
    eyeIconConfirm.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
    lucide.createIcons();
  });

  // Basic client-side validation + store to localStorage + redirect to dashboard
  document.getElementById('signupForm').addEventListener('submit', e => {
    e.preventDefault();
    const form = e.target;
    const name = form.elements['name'].value.trim();
    const email = form.elements['email'].value.trim();
    const password = passwordInput.value;
    const confirm = confirmInput.value;

    if (!name || !email) {
      alert("Please enter name and email.");
      return;
    }
    if (password !== confirm) {
      alert("Passwords do not match!");
      return;
    }
    if (password.length < 6) {
      alert("Password should be at least 6 characters long.");
      return;
    }

    const user = { name, email, password };
    try {
      localStorage.setItem('haneus_user', JSON.stringify(user));
      localStorage.setItem('haneus_logged_in', 'true');
      window.location.href = 'dashboard.html';
    } catch (err) {
      alert("Could not save account. Please check browser settings.");
    }
  });
</script>

</body>
</html>
