<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <img src="images/coffee.png" alt="Coffee">
    <h1></h1>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h2>USER LOGIN</h2>

    <form id="loginForm">

      <!-- Username -->
      <div class="input-group float-group">
        <i class="fa-regular fa-user"></i>
        <input type="text" id="username" name="username" placeholder=" " autocomplete="username" required>
        <label for="username">Username</label>
      </div>

      <!-- Password -->
      <div class="input-group float-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" name="password" placeholder=" " autocomplete="current-password" required>
        <label for="password">Password</label>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
          <i class="fa-regular fa-eye" id="togglePwIcon"></i>
        </button>
      </div>

      <!-- Options row: Remember me + Forgot Password -->
      <div class="options-row">
        <label class="remember-label">
          <input type="checkbox" name="rememberMe"> Remember me
        </label>
        <button type="button" id="forgotPwBtn" class="forgot-link">Forgot Password?</button>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>

      <button type="submit" id="loginBtn" class="login-btn">Login</button>

      <div class="register">
        Don't have an account? <a href="register.html">Register here</a>
      </div>

    </form>


  </div>

</div>

<!-- ── Full-page login success overlay ───────────────────── -->
<div id="loginSuccessOverlay" class="login-overlay" style="display:none;">
  <div class="login-overlay-card">
    <p id="welcomeMsg" class="welcome-msg"></p>
    <svg class="pl" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <circle class="pl__ring pl__ring--a" cx="120" cy="120" r="105" fill="none"
        stroke-width="20" stroke-dasharray="0 660" stroke-dashoffset="-330" stroke-linecap="round"/>
      <circle class="pl__ring pl__ring--b" cx="120" cy="120" r="35" fill="none"
        stroke-width="20" stroke-dasharray="0 220" stroke-dashoffset="-110" stroke-linecap="round"/>
      <circle class="pl__ring pl__ring--c" cx="85" cy="120" r="70" fill="none"
        stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"/>
      <circle class="pl__ring pl__ring--d" cx="155" cy="120" r="70" fill="none"
        stroke-width="20" stroke-dasharray="0 440" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<!-- ── Forced Password Change Modal ────────────────────────── -->
<div id="forcedPasswordChangeModal" class="login-overlay" style="display:none;">
  <div class="login-overlay-card" style="max-width: 400px; padding: 2rem;">
    <p id="forcedPwMsg" class="welcome-msg" style="text-align: center; margin-bottom: 1.5rem;"></p>
    
    <div class="input-group float-group" style="margin-bottom: 1.5rem;">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="newForcedPassword" name="newForcedPassword" placeholder=" " required>
      <label for="newForcedPassword">New Password</label>
    </div>
    
    <div class="input-group float-group" style="margin-bottom: 1.5rem;">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="confirmForcedPassword" name="confirmForcedPassword" placeholder=" " required>
      <label for="confirmForcedPassword">Confirm Password</label>
    </div>
    
    <div id="forcedPwError" class="error-msg" style="margin-bottom: 1rem; display:none;"></div>
    
    <div class="login-btns" style="display: flex; gap: 1rem;">
      <button class="btn-lo-confirm" id="submitForcedPassword" style="flex: 1;">Change Password</button>
    </div>
  </div>
</div>

<!-- ── Forgot Password Modal ───────────────────────────────── -->
<div id="forgotPasswordModal" class="login-overlay" style="display:none;">
  <div class="login-overlay-card" style="max-width: 380px; padding: 2rem;">
    <h3 style="margin-bottom: 1rem;">Reset Password</h3>
    <p style="font-size:0.9rem; margin-bottom:1.5rem;">Enter your email address and we'll send you a password reset link.</p>
    <div class="input-group" style="margin-bottom: 1.5rem;">
      <i class="fa-regular fa-envelope"></i>
      <input type="email" id="resetIdentifier" placeholder="your@email.com">
    </div>
    <div class="login-btns" style="display: flex; gap: 1rem;">
      <button class="btn-lo-cancel" id="closeForgotModal">Cancel</button>
      <button class="btn-lo-confirm" id="sendResetLink">Send Reset Link</button>
    </div>
    <div id="resetFeedback" class="error-msg" style="margin-top: 1rem; display:none;"></div>
  </div>
</div>

<script src="js/login.js"></script>

</body>
</html>
