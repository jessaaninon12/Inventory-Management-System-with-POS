<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haneus Café — Login</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="split-screen">

  <!-- Left: Login Form -->
  <div class="auth-side">
    <div class="form-container">
      <h1>USER LOGIN</h1>

      <form id="loginForm">
        <div class="input-group">
          <i data-lucide="user"></i>
          <input type="text" name="username" placeholder="Username" required autocomplete="username">
        </div>

        <div class="input-group password-wrapper">
          <i data-lucide="lock"></i>
          <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <div id="errorMsg" style="display:none; background:#fef2f2; color:#991b1b; border:1px solid #fecaca; border-radius:8px; padding:0.75rem 1rem; margin-bottom:1rem; font-size:0.9rem; text-align:center;"></div>

        <button type="submit" class="btn-login" id="loginBtn">Login</button>
      </form>

      <div class="divider"><span>OR</span></div>

      <div class="signup-link">
        Don’t have an account? <a href="register.html">Sign up here.</a>
      </div>
    </div>
  </div>

  <!-- Right: Aesthetic Panel -->
  <div class="visual-side"></div>

</div>

<script src="js/login.js"></script>

</body>
</html>
