<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haneus Café — Login</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-left:    #f8f1e9;      /* warm cream/beige */
      --text-dark:  #3c2f2f;      /* deep coffee brown */
      --accent:     #c47b42;      /* caramel */
      --accent-dark:#a35f2e;
      --input-bg:   #fffaf5;
      --shadow:     0 8px 24px rgba(60,47,47,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--bg-left);
      color: var(--text-dark);
      overflow: hidden;
    }

    .split-screen {
      display: flex;
      height: 100vh;
    }

    .auth-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg-left);
    }

    .form-container {
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2.5rem;
      text-align: center;
      color: var(--text-dark);
    }

    .input-group {
      position: relative;
      margin-bottom: 1.4rem;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1rem 1rem 3.2rem;
      border: none;
      border-radius: 12px;
      background: var(--input-bg);
      font-size: 1rem;
      color: var(--text-dark);
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(196,123,66,0.18), var(--shadow);
    }

    .input-group svg {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--accent);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dark);
      opacity: 0.6;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.2rem 0 1.8rem;
      font-size: 0.9rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-dark);
    }

    .remember input[type="checkbox"] {
      accent-color: var(--accent);
      width: 18px;
      height: 18px;
    }

    .forgot {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 60%;
      margin: 0 auto 1.8rem;
      display: block;
      padding: 0.95rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
    }

    .btn-login:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 1.6rem 0 1rem;
      color: #aaa;
      font-size: 0.9rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      padding: 0 1.2rem;
    }

    .signup-link {
      text-align: center;
      font-size: 0.95rem;
      color: #666;
      margin-top: 0.8rem;
    }

    .signup-link a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    /* Right: Visual */
    .visual-side {
      flex: 1;
      background: linear-gradient(90deg, #3c2f2f 0%, #1f1717 100%);
      position: relative;
      overflow: hidden;
    }

    .visual-side::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(196,123,66,0.08) 0%, transparent 60%);
      opacity: 0.7;
    }

    @media (max-width: 1023px) {
      .split-screen {
        flex-direction: column;
      }
      .visual-side {
        display: none;
      }
      .auth-side {
        padding: 1.5rem;
      }
      .form-container {
        max-width: 420px;
      }
    }
  </style>
</head>
<body>

<div class="split-screen">

  <!-- Left: Login Form -->
  <div class="auth-side">
    <div class="form-container">
      <h1>USER LOGIN</h1>

      <form id="loginForm">
        <div class="input-group">
          <i data-lucide="user"></i>
          <input type="text" name="username" placeholder="Username" required autocomplete="username">
        </div>

        <div class="input-group password-wrapper">
          <i data-lucide="lock"></i>
          <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
          <button type="button" class="toggle-password" id="togglePassword">
            <i data-lucide="eye" id="eyeIcon"></i>
          </button>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <div id="errorMsg" style="display:none; background:#fef2f2; color:#991b1b; border:1px solid #fecaca; border-radius:8px; padding:0.75rem 1rem; margin-bottom:1rem; font-size:0.9rem; text-align:center;"></div>

        <button type="submit" class="btn-login" id="loginBtn">Login</button>
      </form>

      <div class="divider"><span>OR</span></div>

      <div class="signup-link">
        Don’t have an account? <a href="register.html">Sign up here.</a>
      </div>
    </div>
  </div>

  <!-- Right: Aesthetic Panel -->
  <div class="visual-side"></div>

</div>

<script>
  lucide.createIcons();

  // Password visibility toggle
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');

  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
    lucide.createIcons();
  });

  // Form submit — POST to Django backend
  const API_BASE = 'http://localhost:8000';
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    const form = e.target;
    const username = form.username.value.trim();
    const password = form.password.value;

    try {
      const res = await fetch(`${API_BASE}/api/auth/login/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (res.ok && data.success) {
        // Store user data and redirect to dashboard
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.textContent = data.error || 'Invalid username or password.';
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorMsg.textContent = 'Cannot connect to server. Make sure the backend is running.';
      errorMsg.style.display = 'block';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  });
</script>

</body>
</html>
