<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css">
  <style>
    /* Reuse login styles for consistency */
    .reset-container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .reset-card {
      background: white;
      border-radius: 12px;
      padding: 3rem;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    
    .reset-card h2 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #333;
      text-align: center;
    }
    
    .reset-card p {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2rem;
      text-align: center;
      line-height: 1.5;
    }
    
    .reset-card .input-group {
      margin-bottom: 1.5rem;
    }
    
    .reset-card .input-group i {
      color: #667eea;
    }
    
    .reset-status {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.9rem;
      animation: slideUp 0.3s ease;
    }
    
    .reset-status.error {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #dc3545;
    }
    
    .reset-status.success {
      background: rgba(40, 167, 69, 0.1);
      border: 1px solid rgba(40, 167, 69, 0.3);
      color: #28a745;
    }
    
    .reset-status.info {
      background: rgba(23, 162, 184, 0.1);
      border: 1px solid rgba(23, 162, 184, 0.3);
      color: #17a2b8;
    }
    
    .reset-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }
    
    .reset-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .reset-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .reset-links {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .reset-links a, .reset-links button {
      font-size: 0.85rem;
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.3s ease;
      padding: 0;
    }
    
    .reset-links a:hover, .reset-links button:hover {
      color: #764ba2;
      text-decoration: underline;
    }
    
    .loading-spinner {
      display: none;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="reset-container">
  <div class="reset-card">
    <h2>Reset Your Password</h2>
    <p id="mainMessage">Loading password reset form...</p>
    
    <div id="resetStatus" class="reset-status"></div>
    
    <div id="tokenValidatingSpinner" class="loading-spinner">
      <div class="spinner"></div>
      <p style="margin-top: 1rem; color: #667eea;">Validating reset link...</p>
    </div>
    
    <div id="resetForm" style="display: none;">
      <div class="input-group float-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="newPassword" name="newPassword" placeholder=" " required>
        <label for="newPassword">New Password</label>
      </div>
      
      <div class="input-group float-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder=" " required>
        <label for="confirmPassword">Confirm Password</label>
      </div>
      
      <button type="button" id="submitBtn" class="reset-btn">Reset Password</button>
    </div>
    
    <div class="reset-links">
      <a href="login.html">Back to Login</a>
    </div>
  </div>
</div>

<script src="js/reset-password.js"></script>

</body>
</html>
